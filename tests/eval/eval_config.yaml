metrics_to_run:
  - custom_response_quality

custom_metrics:
  - name: custom_response_quality
    custom_function: |
      def evaluate(instance):
          import os
          import json
          from google import genai
          from pydantic import BaseModel, Field

          prompt = instance.get("prompt", "")
          response = instance.get("response", "")
          
          # Extract response text safely
          resp_text = ""
          if isinstance(response, dict):
              parts = response.get("parts", [])
              if parts:
                  resp_text = parts[0].get("text", "")
          elif hasattr(response, "parts") and response.parts:
              resp_text = response.parts[0].text
          else:
              resp_text = str(response)

          # Call Gemini via developer API directly to grade the response
          judge_prompt = f"""
          You are an expert quality assurance evaluator for an enterprise AI assistant. Your task is to evaluate the agent's final response given the user prompt.

          Please grade the response quality on a scale of 1 to 5 according to the following criteria:
          1 (Poor): The response fails to address the query, contains incorrect information, or is highly confusing.
          2 (Below Average): The response partially addresses the query but has notable inaccuracies, gaps, or unclear structure.
          3 (Acceptable): The response adequately answers the query but lacks depth, clear structure, or misses minor details.
          4 (Good): The response is accurate, well-structured, and covers the query thoroughly with minor room for improvement.
          5 (Excellent): The response is highly relevant, comprehensive, flawlessly accurate, and excellently structured.

          ### Target Evaluation:
          User Prompt: {prompt}
          Final Response: {resp_text}

          Return your evaluation as a valid JSON object matching this structure:
          {{
            "score": <integer between 1 and 5>,
            "explanation": "<detailed string explaining the rationale for the score assigned>"
          }}
          """

          class GradeResult(BaseModel):
              score: int = Field(description="Score between 1 and 5")
              explanation: str = Field(description="Explanation of the score")

          try:
              client = genai.Client()
              res = client.models.generate_content(
                  model="gemini-2.5-flash",
                  contents=judge_prompt,
                  config={
                      "response_mime_type": "application/json",
                      "response_schema": GradeResult
                  }
              )
              data = json.loads(res.text)
              return {
                  "score": float(data.get("score", 1)),
                  "explanation": data.get("explanation", "")
              }
          except Exception as e:
              return {
                  "score": 1.0,
                  "explanation": f"Failed to grade locally: {str(e)}"
              }
